<!doctype html>
<html lang="zh-CN" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="APIKEY-king · GitHub API 密钥发现与验证控制台"
    />
    <title>APIKEY-king · 控制台</title>
    <script>
      // Avoid FOUC when hydrating dark mode
      (function () {
        try {
          var stored = localStorage.getItem("apikey-king:theme");
          var theme = stored || "system";
          var isDark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
          var lang = localStorage.getItem("apikey-king:lang") || "zh-CN";
          document.documentElement.setAttribute("lang", lang);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-full bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
