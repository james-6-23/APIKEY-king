<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="APIKEY-king · Authentication">
    <title>APIKEY-king · 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: "hsl(222.2 47.4% 11.2%)", foreground: "hsl(210 40% 98%)" },
                        success: { DEFAULT: "hsl(142.1 76.2% 36.3%)", foreground: "hsl(355.7 100% 97.3%)" },
                        destructive: { DEFAULT: "hsl(0 84.2% 60.2%)", foreground: "hsl(210 40% 98%)" }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-slate-50 min-h-screen transition-colors duration-200 relative overflow-x-hidden">
    <div class="bg-ambient"></div>
    <div class="bg-grid"></div>

    <div id="loginPage" class="login-shell page-enter">
        <div class="panel panel--bracketed login-card glass-card">
            <i class="brk-tr"></i><i class="brk-bl"></i>

            <div class="panel__head">
                <span>// 00 — AUTHENTICATION GATE</span>
                <span class="meta"><strong>RESTRICTED</strong></span>
            </div>

            <div class="login-mark">
                <div class="prompt">&gt; apikey-king<span class="cursor-block" aria-hidden="true"></span></div>
                <div class="classify">surveillance console · operator sign-in</div>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="field-row">
                    <label class="field-label" for="password">Passphrase</label>
                    <input type="password" id="password" placeholder="enter passphrase" required autocomplete="current-password" />
                </div>
                <button type="submit" id="loginBtn" class="glow-button">
                    <span class="key">[↵]</span>
                    <span id="loginBtnText">AUTHENTICATE</span>
                    <svg id="loginSpinner" class="hidden w-5 h-5 spinner" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke-width="4" class="opacity-25"></circle>
                        <path stroke-width="4" class="opacity-75"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </button>
            </form>

            <div class="login-foot">
                <span>session · ephemeral · jwt 24h</span>
                <button onclick="toggleDarkMode()" title="切换深色模式" aria-label="toggle theme">
                    <svg id="darkModeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        const API_BASE = window.location.origin;

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            initDarkMode();
            const token = localStorage.getItem('auth_token');
            if (token) {
                verifyAndRedirect(token);
            }
        });

        // Verify existing token and redirect
        async function verifyAndRedirect(token) {
            try {
                const response = await fetch(`${API_BASE}/api/auth/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    window.location.href = '/';
                }
            } catch (error) {
                localStorage.removeItem('auth_token');
            }
        }

        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const spinner = document.getElementById('loginSpinner');

            // Show loading state
            btn.disabled = true;
            btnText.textContent = '登录中...';
            spinner.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (!response.ok) {
                    throw new Error('密码错误');
                }

                const data = await response.json();
                localStorage.setItem('auth_token', data.access_token);

                showToast('登录成功，正在跳转...', 'success');

                // Redirect to main page
                setTimeout(() => {
                    window.location.href = '/';
                }, 500);
            } catch (error) {
                showToast(error.message, 'error');
                // Reset button
                btn.disabled = false;
                btnText.textContent = '登录';
                spinner.classList.add('hidden');
            }
        }

        // Dark mode functions
        function initDarkMode() {
            const isDark = localStorage.getItem('darkMode') === 'true' ||
                (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) {
                document.documentElement.classList.add('dark');
            }
            updateDarkModeIcon();
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('darkMode', isDark.toString());
            updateDarkModeIcon();
        }

        function updateDarkModeIcon() {
            const icon = document.getElementById('darkModeIcon');
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>`;
            } else {
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`;
            }
        }

        // Toast notification
        function showToast(message, type = 'success', duration = 3000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');

            const typeConfig = {
                success: {
                    bg: 'bg-gradient-to-r from-emerald-500 to-green-600',
                    icon: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>`,
                    progressColor: 'bg-emerald-300'
                },
                error: {
                    bg: 'bg-gradient-to-r from-red-500 to-rose-600',
                    icon: `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>`,
                    progressColor: 'bg-red-300'
                }
            };

            const config = typeConfig[type] || typeConfig.success;

            toast.className = `${config.bg} text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 min-w-[280px] max-w-[400px] pointer-events-auto backdrop-blur-sm relative overflow-hidden`;
            toast.style.animation = 'toastSlideIn 0.3s ease-out forwards';

            toast.innerHTML = `
                ${config.icon}
                <span class="text-sm font-medium flex-1">${message}</span>
                <button onclick="this.parentElement.remove()" class="p-1 hover:bg-white/20 rounded-full transition-colors flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
                <div class="absolute bottom-0 left-0 right-0 h-1 ${config.progressColor} opacity-50 origin-left"
                     style="animation: toastProgress ${duration}ms linear forwards"></div>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastSlideOut 0.3s ease-in forwards';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }
    </script>
</body>

</html>
